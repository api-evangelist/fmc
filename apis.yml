aid: fmc
name: FMC Corporation
description: >-
  FMC Corporation is a Philadelphia-headquartered global agricultural
  sciences company that develops and supplies crop protection products
  including herbicides, insecticides, fungicides, and biological
  solutions, alongside precision agriculture technology. Originally
  founded as the Food Machinery Corporation, the modern FMC focuses on
  productivity and resilience for growers worldwide. This repository
  tracks the FMC Corporation entity and any APIs, developer tools, and
  machine-readable artifacts. No public APIs or developer programs are
  currently published. Note that "FMC" is also commonly used as an
  abbreviation for the legacy FMC Technologies brand (now TechnipFMC),
  which is tracked separately under the fmc-technologies repository.
